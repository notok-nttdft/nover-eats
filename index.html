<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Nover Eats</title><style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}header{background:#16a34a;color:#fff;padding:20px}h1{margin:0}.wrap{max-width:900px;margin:auto;padding:20px}.search,input,button{padding:12px;border-radius:8px}input{width:70%;border:1px solid #ccc}button{background:#16a34a;color:#fff;border:none;cursor:pointer}.card{background:#fff;margin:16px 0;padding:16px;border-radius:12px;box-shadow:0 2px 6px #0002}#status{margin-top:20px;font-weight:bold}.bar{height:18px;background:#ddd;border-radius:9px;overflow:hidden}.fill{height:100%;width:0;background:#16a34a;transition:width .5s}
footer{text-align:center;padding:30px;color:#666}
</style></head><body><header><h1>Nover Eats</h1><div>食べ物は届きません。期待だけ届きます。</div></header><div class='wrap'><div class='search'><input placeholder='配達先を入力'><button onclick='order()'>注文する</button></div>
<div class='card'><h3>🥘 空気カレー ★★★★★</h3><p>香りだけ一流。</p></div>
<div class='card'><h3>🍣 エア寿司 ★★★★☆</h3><p>ネタは想像力です。</p></div>
<div class='card'><h3>🍔 存在しないバーガー ★★★★★</h3><p>カロリーゼロ（存在しないため）。</p></div>
<div id='status'>まだ注文していません。</div><div class='bar'><div class='fill' id='fill'></div></div></div><footer>© 2026 sadahiro holdings<br><small>Novering the future.</small></footer>
<script>
function order(){
const msgs=["注文受付中…","レストランが料理を想像しています…","配達員が道に迷っています…","配達員があなたの心を見つけました…","申し訳ありません。本日は『期待』のみのお届けとなりました。"];
let i=0,p=0,f=document.getElementById('fill'),s=document.getElementById('status');
let t=setInterval(()=>{if(p<100){p+=20;f.style.width=p+'%';s.textContent=msgs[Math.min(i,msgs.length-1)];i++;}else{clearInterval(t);alert("🎉 ご注文ありがとうございました！\n期待だけ、無事に配達完了しました。");}},700)}
</script></body></html>
